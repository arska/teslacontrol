apiVersion: apps/v1
kind: Deployment
metadata:
  name: emoncms
  labels:
    app: emoncms
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: emoncms
  template:
    metadata:
      labels:
        app: emoncms
    spec:
      initContainers:
        - name: create-database
          image: dockerhub.vshn.net/library/mariadb:11
          command:
            - sh
            - -c
            - |
              mariadb -h "$MARIADB_HOST" -P "$MARIADB_PORT" -u "$MARIADB_USERNAME" -p"$MARIADB_PASSWORD" \
                -e "CREATE DATABASE IF NOT EXISTS emoncms;"
          envFrom:
            - secretRef:
                name: emoncms-db-credentials
      containers:
        - name: emoncms
          image: ghcr.io/arska/emoncms:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: MYSQL_HOST
              valueFrom:
                secretKeyRef:
                  name: emoncms-db-credentials
                  key: MARIADB_HOST
            - name: MYSQL_PORT
              valueFrom:
                secretKeyRef:
                  name: emoncms-db-credentials
                  key: MARIADB_PORT
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: emoncms-db-credentials
                  key: MARIADB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: emoncms-db-credentials
                  key: MARIADB_PASSWORD
            - name: MYSQL_DATABASE
              value: "emoncms"
            - name: REDIS_ENABLED
              value: "false"
            - name: EMONCMS_DOMAIN
              value: "emoncms.aukia.com"
            - name: EMONCMS_LOG_LEVEL
              value: "2"
          volumeMounts:
            - name: data
              mountPath: /var/opt/emoncms
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: emoncms-data
