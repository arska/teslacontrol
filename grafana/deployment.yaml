apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: dockerhub.vshn.net/teslamate/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_HOST
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_PORT
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_DB
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_USER
            - name: DATABASE_PASS
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_PASSWORD
            - name: GF_SERVER_HTTP_PORT
              value: "3000"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_SERVER_ROOT_URL
              value: "https://teslagrafana.aukia.com"
