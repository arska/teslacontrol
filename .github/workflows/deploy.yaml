name: Deploy to APPUiO Cloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sops
        uses: mdgreenwald/mozilla-sops-action@v1

      - name: Install age
        run: |
          curl -sSfLo age.tar.gz https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz
          tar -xzf age.tar.gz
          sudo mv age/age /usr/local/bin/
          sudo mv age/age-keygen /usr/local/bin/

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"

      - name: Login to APPUiO Cloud
        run: |
          oc login --server=https://api.exoscale-ch-gva-2-0.appuio.cloud:6443 --token=${{ secrets.APPUIO_TOKEN }}
          oc project arska-teslacontrol

      - name: Decrypt secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          for f in $(find . -name '*.sops.yaml' -not -name '.sops.yaml'); do
            sops -d -i "$f"
          done

      - name: Validate evcc config
        run: |
          # Extract evcc.yaml from the decrypted secret and validate it
          python3 -c "
          import yaml, sys
          with open('evcc/secret.sops.yaml') as f:
              secret = yaml.safe_load(f)
          config = secret['stringData']['evcc.yaml']
          with open('/tmp/evcc.yaml', 'w') as f:
              f.write(config)
          "
          docker run --rm -v /tmp/evcc.yaml:/etc/evcc.yaml:ro dockerhub.vshn.net/evcc/evcc:latest checkconfig

      - name: Apply evcc
        run: oc apply -f evcc/

      - name: Apply teslamate
        run: oc apply -f teslamate/

      - name: Apply oauth2-proxy
        run: oc apply -f oauth2-proxy/

      - name: Apply grafana
        run: oc apply -f grafana/

      - name: Apply emoncms
        run: oc apply -f emoncms/

      - name: Apply monitoring
        run: oc apply -f monitoring/
