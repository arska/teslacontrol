apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: evcc
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  host: evcc.aukia.com
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: oauth2-proxy-evcc
    weight: 100
  port:
    targetPort: http
