apiVersion: apps/v1
kind: Deployment
metadata:
  name: teslamate
  labels:
    app: teslamate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teslamate
  template:
    metadata:
      labels:
        app: teslamate
    spec:
      containers:
        - name: teslamate
          image: dockerhub.vshn.net/teslamate/teslamate:latest
          ports:
            - containerPort: 4000
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_HOST
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_PORT
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_DB
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_USER
            - name: DATABASE_PASS
              valueFrom:
                secretKeyRef:
                  name: teslamate-db-credentials
                  key: POSTGRESQL_PASSWORD
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: teslamate
                  key: encryption-key
            - name: DISABLE_MQTT
              value: "true"
            - name: TESLA_AUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: teslamate
                  key: tesla-client-id
            - name: TESLA_AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: teslamate
                  key: tesla-client-secret
            - name: TESLA_API_HOST
              value: "https://fleet-api.prd.eu.vn.cloud.tesla.com"
            - name: TESLA_AUTH_HOST
              value: "https://auth.tesla.com"
            - name: TESLA_AUTH_PATH
              value: "/oauth2/v3"
