apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-grafana
  labels:
    app: oauth2-proxy-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-grafana
  template:
    metadata:
      labels:
        app: oauth2-proxy-grafana
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.0
          args:
            - --provider=google
            - --upstream=http://grafana:3000
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --email-domain=*
            - --authenticated-emails-file=/config/authenticated-emails
          ports:
            - containerPort: 4180
              name: http
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            periodSeconds: 10
          envFrom:
            - secretRef:
                name: oauth2-proxy
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: oauth2-proxy-emails
