apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-evcc
  labels:
    app: oauth2-proxy-evcc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-evcc
  template:
    metadata:
      labels:
        app: oauth2-proxy-evcc
    spec:
      containers:
        - name: oauth2-proxy
          image: dockerhub.vshn.net/oauth2-proxy/oauth2-proxy:v7.9.0
          args:
            - --provider=google
            - --upstream=http://evcc:7070
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --email-domain=*
            - --authenticated-emails-file=/config/authenticated-emails
          ports:
            - containerPort: 4180
              name: http
          envFrom:
            - secretRef:
                name: oauth2-proxy
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: oauth2-proxy-emails
